<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-box">
      <h1>ChatApp</h1>
      <div class="tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="error-msg" id="login-error"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input type="text" id="reg-username" placeholder="Username" required />
        <input type="email" id="reg-email" placeholder="Email" required />
        <input type="password" id="reg-password" placeholder="Password" required />
        <button type="submit">Register</button>
        <p class="error-msg" id="register-error"></p>
      </form>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span id="current-username"></span>
        <button id="logout-btn" title="Logout">⏻</button>
      </div>
      <div class="sidebar-section">
        <h3>Rooms</h3>
        <ul id="room-list"></ul>
        <button id="create-room-btn">+ New Room</button>
      </div>
      <div class="sidebar-section">
        <h3>Documents</h3>
        <label id="doc-upload-btn" for="doc-upload-input">+ Upload document</label>
        <input type="file" id="doc-upload-input" accept=".pdf,.txt,.md" hidden />
        <div id="doc-upload-status" class="doc-status"></div>
        <ul id="document-list"></ul>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-header">
        <span id="active-room-name">Select a room</span>
      </div>

      <div id="messages" class="messages"></div>

      <div id="typing-indicator" class="typing-indicator hidden"></div>

      <form id="message-form" class="message-form">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message... (use @ai to ask the AI)"
          autocomplete="off"
          disabled
        />
        <button type="submit" id="send-btn" disabled>Send</button>
      </form>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/documents.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
